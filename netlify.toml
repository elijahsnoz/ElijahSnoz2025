# Static site — no build step. Serve the repo root as-is.
[build]
  publish = "."
  command = ""

# Long-cache immutable assets; keep HTML fresh.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
